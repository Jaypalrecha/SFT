<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SAHAJ FINTECH — Dual Strategy Backtest Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<style>
:root {
  --bg:      #070d15;
  --bg2:     #0d1a27;
  --bg3:     #0f2133;
  --border:  #1a3050;
  --border2: #243d5a;
  --text:    #e8f4ff;
  --text2:   #6a8ea8;
  --text3:   #3a5570;
  --accent:  #00d4ff;
  --accent-dim: rgba(0,212,255,0.08);
  --win:     #4ade80;
  --win-bg:  rgba(74,222,128,0.12);
  --loss:    #f87171;
  --loss-bg: rgba(248,113,113,0.12);
  --yellow:  #f59e0b;
  --yellow-bg: rgba(245,158,11,0.12);
  --purple:  #a78bfa;
  --mono:    'Space Mono', monospace;
  --sans:    'DM Sans', sans-serif;
  --shadow:  0 4px 24px rgba(0,0,0,0.5);
  --stratA:  #00d4ff;
  --stratB:  #f59e0b;
}
[data-theme="light"] {
  --bg:      #f4f7fb;
  --bg2:     #ffffff;
  --bg3:     #e8eef7;
  --border:  #c8d6e8;
  --border2: #a8bdd4;
  --text:    #0d1f33;
  --text2:   #3a5570;
  --text3:   #7a9ab8;
  --accent:  #0070cc;
  --accent-dim: rgba(0,112,204,0.06);
  --win:     #16a34a;
  --win-bg:  rgba(22,163,74,0.1);
  --loss:    #dc2626;
  --loss-bg: rgba(220,38,38,0.1);
  --yellow:  #d97706;
  --yellow-bg: rgba(217,119,6,0.1);
  --purple:  #7c3aed;
  --shadow:  0 4px 24px rgba(0,0,0,0.1);
  --stratA:  #0070cc;
  --stratB:  #d97706;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; overflow-x:hidden; }
body {
  background:var(--bg); color:var(--text);
  font-family:var(--sans); font-size:13px;
  transition:background 0.3s,color 0.3s; overflow-x:hidden;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
  background-size:40px 40px;
}
[data-theme="light"] body::before {
  background-image:
    linear-gradient(rgba(0,112,204,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,112,204,0.04) 1px,transparent 1px);
}

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border2); }

/* ===== ENTRY SLIDE ===== */
#entry-slide {
  position:fixed; inset:0; z-index:1000;
  background:#070d15;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity 0.8s ease, transform 0.8s ease;
}
#entry-slide.hidden { opacity:0; pointer-events:none; transform:scale(1.04); }

.entry-bg-grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.04) 1px,transparent 1px);
  background-size:40px 40px;
  animation:gridPulse 4s ease-in-out infinite;
}
@keyframes gridPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

.entry-lines { position:absolute; inset:0; overflow:hidden; }
.entry-line {
  position:absolute; height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,0.5),transparent);
  animation:lineScan 3s linear infinite; width:100%;
}
.entry-line:nth-child(1){top:20%;animation-delay:0s}
.entry-line:nth-child(2){top:50%;animation-delay:1s}
.entry-line:nth-child(3){top:80%;animation-delay:2s}
@keyframes lineScan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

.entry-content { position:relative; text-align:center; }

.entry-logo-box {
  width:64px; height:64px; border:2px solid var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:14px; color:var(--accent);
  margin:0 auto 28px; position:relative;
  box-shadow:0 0 40px rgba(0,212,255,0.2);
}
.entry-logo-box::after { content:''; position:absolute; inset:4px; border:1px solid rgba(0,212,255,0.25); }

.entry-ticker {
  font-family:var(--mono); font-size:clamp(28px,6vw,56px);
  font-weight:700; letter-spacing:0.15em; color:var(--text);
  line-height:1; text-transform:uppercase;
  text-shadow:0 0 60px rgba(0,212,255,0.3);
  animation:titleGlow 2s ease-in-out infinite alternate;
}
@keyframes titleGlow {
  from{text-shadow:0 0 20px rgba(0,212,255,0.2)}
  to{text-shadow:0 0 60px rgba(0,212,255,0.6),0 0 120px rgba(0,212,255,0.2)}
}
.entry-accent { color:var(--accent); }

.entry-sub {
  font-family:var(--mono); font-size:clamp(10px,1.5vw,13px);
  letter-spacing:0.25em; color:rgba(0,212,255,0.6);
  margin-top:10px; text-transform:uppercase;
}

.entry-divider {
  width:120px; height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  margin:28px auto;
}

.entry-btn {
  font-family:var(--mono); font-size:12px; font-weight:700;
  letter-spacing:0.2em; color:var(--bg);
  background:var(--accent); border:none;
  padding:14px 56px; cursor:pointer;
  text-transform:uppercase; transition:all 0.3s;
  position:relative; overflow:hidden;
}
.entry-btn::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.3),transparent);
  transform:translateX(-100%); transition:transform 0.4s;
}
.entry-btn:hover::before { transform:translateX(100%); }
.entry-btn:hover { transform:scale(1.05); box-shadow:0 0 40px rgba(0,212,255,0.5); }

.entry-tag {
  position:absolute; bottom:28px;
  font-family:var(--mono); font-size:9px;
  letter-spacing:0.2em; color:rgba(0,212,255,0.3);
}

/* ===== APP LAYOUT ===== */
.app-container { min-height:100vh; position:relative; z-index:1; }

/* ===== TOPBAR ===== */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; height:56px;
  background:linear-gradient(180deg,rgba(0,30,55,0.98),rgba(7,13,21,0.9));
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:50;
  backdrop-filter:blur(12px); flex-shrink:0;
}
[data-theme="light"] .topbar {
  background:linear-gradient(180deg,rgba(244,247,251,0.98),rgba(232,238,247,0.9));
}
.topbar-left { display:flex; align-items:center; gap:10px; min-width:0; flex-shrink:1; }
.topbar-center {
  position:absolute; left:50%; transform:translateX(-50%);
  text-align:center; pointer-events:none;
}
.topbar-logo {
  font-family:var(--mono); font-size:17px; font-weight:700;
  letter-spacing:0.15em; color:#ffffff;
  text-shadow:0 0 20px rgba(0,212,255,0.3), 0 0 60px rgba(0,212,255,0.1);
  white-space:nowrap;
}
.topbar-logo span { color:var(--accent); text-shadow:0 0 24px rgba(0,212,255,0.6); }
.topbar-logo-sub {
  font-family:var(--mono); font-size:8px; letter-spacing:0.25em;
  color:rgba(0,212,255,0.5); margin-top:1px; text-transform:uppercase;
}
[data-theme="light"] .topbar-logo { color:#0d1f33; text-shadow:none; }
[data-theme="light"] .topbar-logo span { text-shadow:none; }
[data-theme="light"] .topbar-logo-sub { color:rgba(0,112,204,0.5); }
.topbar-right { display:flex; align-items:center; gap:12px; }

/* ===== TOGGLE SWITCH ===== */
.toggle-switch {
  width:40px; height:20px; background:var(--border2);
  border-radius:10px; position:relative; cursor:pointer;
  border:none; transition:background 0.3s;
}
.toggle-switch::after {
  content:''; position:absolute; top:3px; left:3px;
  width:14px; height:14px; border-radius:50%;
  background:var(--accent); transition:transform 0.3s;
}
[data-theme="light"] .toggle-switch::after { transform:translateX(20px); }

/* ===== MAIN TABS ===== */
.main-tabs {
  display:flex; gap:0; border-bottom:2px solid var(--border);
  background:var(--bg2); padding:0 24px;
  position:sticky; top:56px; z-index:49;
}
.main-tab {
  font-family:var(--mono); font-size:11px; font-weight:700;
  letter-spacing:0.12em; text-transform:uppercase;
  padding:14px 28px; cursor:pointer;
  color:var(--text3); border:none; background:transparent;
  border-bottom:3px solid transparent;
  transition:all 0.25s; position:relative;
}
.main-tab:hover { color:var(--text2); background:var(--accent-dim); }
.main-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.main-tab.active-a { color:var(--stratA); border-bottom-color:var(--stratA); }
.main-tab.active-b { color:var(--stratB); border-bottom-color:var(--stratB); }
.main-tab.active-vs { color:var(--purple); border-bottom-color:var(--purple); }
.main-tab .tab-dot {
  display:inline-block; width:8px; height:8px; border-radius:50%;
  margin-right:8px; vertical-align:middle;
}
.tab-pane { display:none; }
.tab-pane.active { display:block; }

/* ===== CONTENT AREA ===== */
.content-area { padding:24px; overflow-y:auto; overflow-x:hidden; min-width:0; }

/* ===== CHARGES BAR ===== */
.charges-bar {
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  background:var(--bg2); border:1px solid var(--border); padding:12px 18px;
  margin-bottom:20px; position:relative; min-width:0; overflow:hidden;
}
.charges-bar::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--accent); }
.charges-bar-label {
  font-family:var(--mono); font-size:9px; font-weight:700;
  letter-spacing:0.15em; color:var(--accent); text-transform:uppercase;
  white-space:nowrap;
}
.charges-bar-desc {
  font-family:var(--mono); font-size:9px; color:var(--text3);
  letter-spacing:0.05em;
}
.charges-input-wrap { display:flex; align-items:center; gap:6px; }
.charges-input {
  width:80px; background:var(--bg3); border:1px solid var(--border2);
  color:var(--text); padding:7px 10px; font-family:var(--mono); font-size:12px;
  font-weight:700; outline:none; text-align:center; transition:border-color 0.2s;
}
.charges-input:focus { border-color:var(--accent); }
.capital-input {
  width:140px; background:var(--bg3); border:1px solid var(--border2);
  color:var(--text); padding:7px 10px; font-family:var(--mono); font-size:12px;
  font-weight:700; outline:none; text-align:center; transition:border-color 0.2s;
}
.capital-input:focus { border-color:var(--accent); }
.charges-pct-symbol {
  font-family:var(--mono); font-size:12px; font-weight:700; color:var(--accent);
}
.bar-separator { width:1px; height:28px; background:var(--border2); margin:0 4px; flex-shrink:0; }
.charges-apply-btn {
  font-family:var(--mono); font-size:9px; font-weight:700;
  letter-spacing:0.12em; text-transform:uppercase;
  padding:7px 16px; border:none;
  background:var(--accent); color:var(--bg);
  cursor:pointer; transition:all 0.2s;
}
.charges-apply-btn:hover { background:#00eeff; }
.charges-total { font-family:var(--mono); font-size:10px; color:var(--text2); }
.charges-total strong { color:var(--loss); font-weight:700; }
.capital-display { font-family:var(--mono); font-size:10px; color:var(--text2); }
.capital-display strong { color:var(--accent); font-weight:700; }

/* ===== UPLOAD ZONE ===== */
.upload-section { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
.upload-box {
  border:1px dashed var(--border2); padding:32px; text-align:center;
  cursor:pointer; transition:all 0.25s; background:var(--bg2); position:relative;
}
.upload-box:hover,.upload-box.dragover { border-color:var(--accent); background:var(--accent-dim); }
.upload-box.loaded { border-color:var(--win); border-style:solid; }
.upload-box input[type="file"] { display:none; }
.upload-icon { font-size:32px; margin-bottom:10px; display:block; }
.upload-title { font-family:var(--mono); font-size:12px; color:var(--text); margin-bottom:4px; letter-spacing:0.06em; }
.upload-desc { font-size:11px; color:var(--text2); }
.upload-status { margin-top:12px; font-family:var(--mono); font-size:10px; color:var(--win); display:none; letter-spacing:0.1em; }
.upload-box.loaded .upload-status { display:block; }

.run-btn-wrap { text-align:center; margin:16px 0 24px; }
.run-btn {
  font-family:var(--mono); font-size:11px; font-weight:700;
  letter-spacing:0.15em; text-transform:uppercase;
  padding:12px 48px; border:none;
  background:var(--accent); color:var(--bg);
  cursor:pointer; transition:all 0.3s;
  opacity:0.4; pointer-events:none;
}
.run-btn:hover { background:#00eeff; box-shadow:0 0 30px rgba(0,212,255,0.4); }

/* ===== SECTIONS ===== */
.section { margin-bottom:40px; opacity:0; transform:translateY(8px); animation:fadeIn 0.4s ease forwards; min-width:0; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

.section-label {
  font-family:var(--mono); font-size:9px; letter-spacing:0.25em;
  color:var(--accent); text-transform:uppercase; margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
  padding-bottom:10px; border-bottom:1px solid var(--border);
}
.section-label .sec-num {
  font-family:var(--mono); font-size:9px; color:var(--accent);
  background:rgba(0,212,255,0.08); border:1px solid rgba(0,212,255,0.2);
  padding:3px 8px; letter-spacing:0.15em;
}
.section-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* ===== KPI / STAT CARDS ===== */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px; min-width:0; }
.stat-card {
  background:var(--bg2); border:1px solid var(--border); padding:14px 16px;
  transition:border-color 0.2s; position:relative; min-width:0; overflow:hidden;
}
.stat-card::before { content:''; position:absolute; top:0; left:0; width:2px; height:100%; background:var(--border); }
.stat-card:hover { border-color:var(--border2); }
.stat-card:hover::before { background:var(--accent); }
.stat-name { font-family:var(--mono); font-size:8px; letter-spacing:0.15em; color:var(--text3); text-transform:uppercase; margin-bottom:6px; }
.stat-val { font-family:var(--mono); font-size:18px; font-weight:700; color:var(--text); line-height:1; }
.stat-val.positive,.stat-val.green { color:var(--win); }
.stat-val.negative,.stat-val.red { color:var(--loss); }
.stat-val.neutral { color:var(--text); }
.stat-val.accent { color:var(--accent); }
.stat-sub { font-family:var(--mono); font-size:9px; color:var(--text3); margin-top:4px; }

/* ===== CHARTS ===== */
.charts-grid-1 { display:grid; grid-template-columns:1fr; gap:14px; margin-bottom:14px; min-width:0; }
.charts-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; min-width:0; }
.charts-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; margin-bottom:14px; min-width:0; }
.chart-card {
  background:var(--bg2); border:1px solid var(--border); padding:16px;
  position:relative; min-width:0; overflow:hidden;
}
.chart-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--border2),transparent);
}
.chart-title {
  font-family:var(--mono); font-size:9px; letter-spacing:0.15em;
  color:var(--text2); text-transform:uppercase; margin-bottom:14px;
}
.chart-wrap { position:relative; height:260px; }
.chart-wrap-tall { position:relative; height:340px; }
.chart-wrap-medium { position:relative; height:280px; }
.chart-wrap-sm { position:relative; height:200px; }
.chart-wrap canvas, .chart-wrap-tall canvas, .chart-wrap-medium canvas, .chart-wrap-sm canvas {
  width:100%!important; height:100%!important;
}

/* ===== GAUGE / RISK CARDS ===== */
.gauge-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; min-width:0; }
.gauge-card {
  background:var(--bg2); border:1px solid var(--border); padding:20px; text-align:center;
  position:relative; min-width:0; overflow:hidden;
}
.gauge-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
}
.gauge-label { font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:0.12em; color:var(--text2); text-transform:uppercase; margin-bottom:8px; }
.gauge-value { font-family:var(--mono); font-size:28px; font-weight:700; margin:10px 0; }

.explainer { text-align:left; margin-top:16px; padding-top:14px; border-top:1px solid var(--border); }
.explainer-block { margin-bottom:12px; }
.explainer-block h4 { font-family:var(--mono); font-size:8px; text-transform:uppercase; letter-spacing:0.15em; color:var(--accent); margin-bottom:6px; font-weight:700; }
.explainer-block p { font-size:11px; color:var(--text2); line-height:1.7; }
.explainer-block code { font-family:var(--mono); font-size:10px; background:var(--bg3); padding:2px 6px; color:var(--accent); }

/* ===== DATA TABLE ===== */
.table-section { margin-bottom:24px; }
.table-wrap { overflow-x:auto; border:1px solid var(--border); }
table.data-table { width:100%; border-collapse:collapse; font-size:10px; }
table.data-table thead tr { background:var(--bg3); }
table.data-table thead th {
  padding:8px 10px; text-align:left; font-family:var(--mono); font-size:8px;
  letter-spacing:0.12em; color:var(--text3); text-transform:uppercase;
  border-bottom:1px solid var(--border); font-weight:400; white-space:nowrap;
  cursor:pointer; user-select:none; position:sticky; top:0; background:var(--bg3);
}
table.data-table thead th:hover { color:var(--accent); }
table.data-table tbody td {
  padding:7px 10px; border-bottom:1px solid var(--border);
  white-space:nowrap; color:var(--text); font-family:var(--mono); font-size:10px;
}
table.data-table tbody tr:hover { background:rgba(0,212,255,0.02); }
table.data-table tbody tr:last-child td { border-bottom:none; }

.table-toolbar {
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  border-bottom:1px solid var(--border); background:var(--bg2);
}
.table-toolbar input {
  flex:1; padding:7px 12px;
  background:var(--bg3); border:1px solid var(--border2);
  color:var(--text); font-family:var(--mono); font-size:11px;
  outline:none; transition:border-color 0.2s;
}
.table-toolbar input:focus { border-color:var(--accent); }
.table-toolbar select {
  padding:7px 12px;
  background:var(--bg3); border:1px solid var(--border2);
  color:var(--text); font-family:var(--mono); font-size:11px;
  outline:none; cursor:pointer;
}
.table-pagination {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px; background:var(--bg2); border-top:1px solid var(--border);
}
.table-pagination button {
  padding:5px 14px; font-family:var(--mono); font-size:9px;
  letter-spacing:0.1em; text-transform:uppercase;
  border:1px solid var(--border2); background:transparent;
  color:var(--text2); cursor:pointer; transition:all 0.2s;
}
.table-pagination button:hover { border-color:var(--accent); color:var(--accent); }
.table-pagination button:disabled { opacity:0.3; cursor:not-allowed; }
.table-pagination span { font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:0.08em; }

/* ===== TIMELINE / TRADE LOG ===== */
.tl-badge { font-family:var(--mono); font-size:9px; padding:2px 8px; font-weight:700; }
.tl-badge.long { background:var(--win-bg); color:var(--win); }
.tl-badge.short { background:var(--loss-bg); color:var(--loss); }

/* ===== HEATMAP ===== */
.heatmap-table { width:100%; border-collapse:separate; border-spacing:3px; font-family:var(--mono); font-size:10px; }
.heatmap-table th { padding:6px; font-weight:400; color:var(--text3); font-size:8px; text-transform:uppercase; letter-spacing:0.1em; }
.heatmap-table td { padding:8px 6px; text-align:center; font-weight:700; font-size:10px; }

/* ===== STREAK BAR ===== */
.streak-bar { display:flex; gap:2px; align-items:flex-end; height:80px; margin:16px 0; }
.streak-bar .sbar { flex:1; min-width:3px; border-radius:1px 1px 0 0; transition:all 0.2s; }

<script>
// ========== ENTRY & THEME ==========
function enterApp() {
  document.getElementById('entry-slide').classList.add('hidden');
  document.getElementById('main-app').style.display = 'block';
  setTimeout(() => { document.getElementById('entry-slide').style.display = 'none'; }, 800);
}

document.getElementById('theme-toggle').addEventListener('click',()=>{
  const html=document.documentElement;
  const isLight=html.getAttribute('data-theme')==='light';
  html.setAttribute('data-theme',isLight?'dark':'light');
  document.getElementById('theme-label').textContent=isLight?'DARK':'LIGHT';
  [stratA, stratB].forEach(s => { if(s.trades.length) s.rebuildAll(); });
});

function switchMainTab(tabId) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  document.querySelectorAll('.main-tab').forEach(t => {
    t.className = 'main-tab';
    if (t.dataset.tab === tabId) {
      if (tabId==='tab-a') t.classList.add('active-a');
      else if (tabId==='tab-b') t.classList.add('active-b');
      else t.classList.add('active-vs');
    }
  });
  if (tabId==='tab-vs') buildComparison();
  // Resize charts on tab switch
  setTimeout(()=>{
    [stratA, stratB].forEach(s => Object.values(s.chartInstances).forEach(c=>c.resize()));
  }, 100);
}

// ========== SHARED UTILITIES ==========
const CC={green:'#4ade80',red:'#f87171',blue:'#00d4ff',cyan:'#06b6d4',yellow:'#f59e0b',purple:'#a78bfa',greenBg:'rgba(74,222,128,0.15)',redBg:'rgba(248,113,113,0.15)',blueBg:'rgba(0,212,255,0.15)',cyanBg:'rgba(6,182,212,0.15)'};

function fN(n,d=2){return n.toLocaleString('en-IN',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fC(n){return '₹'+fN(n);}
function fD(d){return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function fDT(d){return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:false});}
function fDur(days){if(days<1){const hrs=days*24;return hrs<1?Math.round(hrs*60)+'m':fN(hrs,1)+'h';}return fN(days,1)+'d';}

function gtc(){
  const isDark=document.documentElement.getAttribute('data-theme')!=='light';
  return{
    grid:isDark?'rgba(26,48,80,0.5)':'rgba(0,0,0,0.06)',
    gridText:isDark?'#3a5570':'#7a9ab8',
    text:isDark?'#e8f4ff':'#0d1f33',
    textSec:isDark?'#6a8ea8':'#3a5570',
    muted:isDark?'#3a5570':'#7a9ab8',
    border:isDark?'#1a3050':'#c8d6e8',
    cardBg:isDark?'#0d1a27':'#ffffff'
  };
}
function cdf(){
  const t=gtc();
  return{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:t.textSec,font:{family:"'Space Mono',monospace",size:10},boxWidth:10,padding:16}},
      tooltip:{backgroundColor:t.cardBg,titleColor:t.text,bodyColor:t.textSec,borderColor:t.border,borderWidth:1,cornerRadius:0,
        titleFont:{family:"'Space Mono',monospace",weight:'700',size:11},bodyFont:{family:"'Space Mono',monospace",size:10},padding:12}},
    scales:{x:{grid:{color:t.grid},ticks:{color:t.gridText,font:{family:"'Space Mono',monospace",size:9},maxRotation:0,autoSkip:true,maxTicksLimit:12}},
      y:{grid:{color:t.grid},ticks:{color:t.gridText,font:{family:"'Space Mono',monospace",size:9}}}}
  };
}

function parseCSV(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^\uFEFF/,''));
  return lines.slice(1).map(line=>{const vals=[];let cur='',inQ=false;for(let c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=c;}vals.push(cur.trim());const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||'');return obj;});
}
function parseDate(str){const p=str.match(/(\d{2})-(\d{2})-(\d{4})\s+(\d{2}):(\d{2})/);if(!p)return new Date(str);return new Date(+p[3],+p[2]-1,+p[1],+p[4],+p[5]);}
function parseTrades(rows){
  const g={};rows.forEach(r=>{const n=r['Trade #'];if(!g[n])g[n]={};if(r['Type'].startsWith('Entry'))g[n].entry=r;if(r['Type'].startsWith('Exit'))g[n].exit=r;});
  const res=[];
  Object.keys(g).sort((a,b)=>+a-+b).forEach(n=>{
    const e=g[n];if(!e.entry||!e.exit)return;
    const dir=e.entry['Type'].includes('long')?'Long':'Short';
    const et=parseDate(e.entry['Date and time']),xt=parseDate(e.exit['Date and time']);
    const grossPnl=+e.exit['Net P&L INR'];
    res.push({num:+n,direction:dir,entryTime:et,exitTime:xt,entryPrice:+e.entry['Price INR'],exitPrice:+e.exit['Price INR'],signal:e.exit['Signal'],qty:+e.entry['Position size (qty)'],value:+e.entry['Position size (value)'],grossPnl:grossPnl,pnl:grossPnl,pnlPct:+e.exit['Net P&L %'],cumPnl:+e.exit['Cumulative P&L INR'],cumPnlPct:+e.exit['Cumulative P&L %'],charges:0,durationMs:xt-et,durationDays:(xt-et)/(1000*60*60*24),win:grossPnl>0});
  });return res;
}
function parseIndex(rows){
  return rows.map(r=>{const ds=r['Date']||r['date']||Object.values(r)[0];const close=+(r['Close']||r['close']||Object.values(r)[1]);let date;if(ds.includes('-')){const p=ds.split('-');date=p[0].length===4?new Date(ds):new Date(p[2]+'-'+p[1]+'-'+p[0]);}else if(ds.includes('/')){const p=ds.split('/');date=new Date(p[2]+'-'+p[1]+'-'+p[0]);}else date=new Date(ds);return{date,close};}).filter(r=>!isNaN(r.close)&&!isNaN(r.date)).sort((a,b)=>a.date-b.date);
}

  _bindEvents() {
    const p = this.prefix, self = this;
    // Upload
    this._setupUpload(p+'-trade-upload', p+'-trade-file', p+'-trade-status', (text, name) => {
      self.rawTrades = parseTrades(parseCSV(text));
      self.applyCharges();
      self.tradeLoaded = true;
      self.stratName = name.replace('.csv','').toUpperCase();
    });
    this._setupUpload(p+'-index-upload', p+'-index-file', p+'-index-status', (text) => {
      self.indexData = parseIndex(parseCSV(text));
      self.indexLoaded = true;
    });
    // Run
    document.getElementById(p+'-run-btn').addEventListener('click', () => {
      if (!self.trades.length) return;
      self.applyCharges();
      document.getElementById(p+'-analysis-content').style.display = 'block';
      self.runAnalysis();
      self.analyzed = true;
      document.getElementById(p+'-sec-summary').scrollIntoView({behavior:'smooth'});
    });
    // Charges apply
    document.getElementById(p+'-charges-apply-btn').addEventListener('click', () => self.applyAndRebuild());
    document.getElementById(p+'-charges-pct-input').addEventListener('keydown', e => { if(e.key==='Enter') self.applyAndRebuild(); });
    document.getElementById(p+'-capital-input').addEventListener('keydown', e => { if(e.key==='Enter') self.applyAndRebuild(); });
    // Cap base buttons
    [p+'-cb-initial', p+'-cb-deployed', p+'-cb-exposure'].forEach(id => {
      document.getElementById(id).addEventListener('click', function() {
        self.setCapBase(this.dataset.mode);
      });
    });
    document.getElementById(p+'-capbase-apply').addEventListener('click', () => self.applyCapBaseAndRebuild());
    document.getElementById(p+'-capbase-input').addEventListener('keydown', e => { if(e.key==='Enter') self.applyCapBaseAndRebuild(); });
  }

  _setupUpload(bId, fId, sId, cb) {
    const self = this;
    const box = document.getElementById(bId), inp = document.getElementById(fId);
    box.addEventListener('click', () => inp.click());
    box.addEventListener('keydown', e => { if(e.key==='Enter') inp.click(); });
    box.addEventListener('dragover', e => { e.preventDefault(); box.classList.add('dragover'); });
    box.addEventListener('dragleave', () => box.classList.remove('dragover'));
    box.addEventListener('drop', e => { e.preventDefault(); box.classList.remove('dragover'); if(e.dataTransfer.files.length) hf(e.dataTransfer.files[0]); });
    inp.addEventListener('change', e => { if(e.target.files.length) hf(e.target.files[0]); });
    function hf(file) {
      const r = new FileReader();
      r.onload = e => {
        cb(e.target.result, file.name);
        box.classList.add('loaded');
        document.getElementById(sId).textContent = '✓ ' + file.name;
        self._checkReady();
      };
      r.readAsText(file);
    }
  }

  _checkReady() {
    if (this.tradeLoaded) {
      const b = document.getElementById(this.prefix + '-run-btn');
      b.style.opacity = '1';
      b.style.pointerEvents = 'auto';
    }
  }

  getChargesPct() { return parseFloat(document.getElementById(this.prefix+'-charges-pct-input').value) || 0; }
  getCapitalDeployed() {
    const raw = document.getElementById(this.prefix+'-capital-input').value.replace(/,/g,'').replace(/₹/g,'').trim();
    return parseFloat(raw) || 0;
  }

  setCapBase(mode) {
    this.capBaseMode = mode;
    const p = this.prefix;
    document.querySelectorAll('#'+p+'-capbase-bar .capbase-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    const inputWrap = document.getElementById(p+'-capbase-input-wrap');
    const display = document.getElementById(p+'-capbase-display');
    if (mode === 'initial') {
      inputWrap.style.display = 'none';
      const val = this.rawTrades.length ? this.rawTrades[0].value : 0;
      display.innerHTML = 'BASE: <strong>INITIAL CAPITAL — ₹' + (val > 0 ? fN(val,0) : '—') + '</strong>';
    } else if (mode === 'deployed') {
      inputWrap.style.display = 'flex';
      display.innerHTML = this.capBaseUserValue > 0 ? 'BASE: <strong>DEPLOYED — ₹' + fN(this.capBaseUserValue,0) + '</strong>' : 'BASE: <strong>DEPLOYED CAPITAL — ENTER AMOUNT</strong>';
    } else {
      inputWrap.style.display = 'none';
      display.innerHTML = 'BASE: <strong>EXPOSURE CAPITAL (PER-TRADE BUY VALUE)</strong>';
    }
    if (mode !== 'deployed' && this.rawTrades.length) {
      this.applyCharges();
      if (this.analyzed) this.rebuildAll();
    }
  }

  applyCapBaseAndRebuild() {
    const raw = document.getElementById(this.prefix+'-capbase-input').value.replace(/,/g,'').replace(/₹/g,'').trim();
    this.capBaseUserValue = parseFloat(raw) || 0;
    if (this.capBaseUserValue <= 0) return;
    document.getElementById(this.prefix+'-capbase-display').innerHTML = 'BASE: <strong>DEPLOYED — ₹' + fN(this.capBaseUserValue,0) + '</strong>';
    if (this.rawTrades.length) {
      this.applyCharges();
      if (this.analyzed) this.rebuildAll();
    }
  }

  applyCharges() {
    const pct = this.getChargesPct() / 100;
    const userCap = this.getCapitalDeployed();
    let cumPnl = 0;
    const baseCap = this.rawTrades.length ? this.rawTrades[0].value : 0;
    let fixedCap;
    if (this.capBaseMode === 'deployed' && this.capBaseUserValue > 0) fixedCap = this.capBaseUserValue;
    else if (this.capBaseMode === 'deployed' && userCap > 0) fixedCap = userCap;
    else fixedCap = baseCap;

    this.trades = this.rawTrades.map(rt => {
      const t = {...rt};
      const buyValue = t.entryPrice * t.qty;
      const sellValue = t.exitPrice * t.qty;
      const turnover = buyValue + sellValue;
      const charges = turnover * pct;
      t.charges = charges;
      t.pnl = t.grossPnl - charges;
      t.win = t.pnl > 0;
      let capForTrade = this.capBaseMode === 'exposure' ? t.value : fixedCap;
      t.pnlPct = capForTrade > 0 ? (t.pnl / capForTrade) * 100 : 0;
      cumPnl += t.pnl;
      t.cumPnl = cumPnl;
      const cumBase = this.capBaseMode === 'exposure' ? baseCap : fixedCap;
      t.cumPnlPct = cumBase > 0 ? (cumPnl / cumBase) * 100 : 0;
      t.effectiveCap = this.capBaseMode === 'exposure' ? baseCap : fixedCap;
      t.tradeBaseCap = capForTrade;
      return t;
    });

    if (this.trades.length) {
      const totalCharges = this.trades.reduce((s, t) => s + t.charges, 0);
      const el = document.getElementById(this.prefix+'-charges-total-display');
      if (el && totalCharges > 0) el.innerHTML = 'CHARGES: <strong>₹' + fN(totalCharges) + '</strong>';
      else if (el) el.innerHTML = '';
    }
  }

  applyAndRebuild() {
    if (!this.rawTrades.length) return;
    this.applyCharges();
    if (this.analyzed) this.rebuildAll();
  }

  rebuildAll() {
    Object.keys(this.chartInstances).forEach(k => { this.chartInstances[k].destroy(); });
    this.chartInstances = {};
    this.runAnalysis();
  }

  runAnalysis() {
    this.buildSummary(); this.buildEquity(); this.buildBenchmark(); this.buildLongShort();
    this.buildDuration(); this.buildMonthly(); this.buildStreak(); this.buildDistribution();
    this.buildRiskMetrics(); this.buildMonteCarlo(); this.buildDOW(); this.buildHourOfDay();
    this.buildSeasonality(); this.buildAdvStats(); this.buildIndividual(); this.buildTradeTable();
    this.buildRolling();
  }

  // ===== METRICS EXTRACTION (for comparison) =====
  getMetrics() {
    const t = this.trades;
    if (!t.length) return null;
    const wins=t.filter(x=>x.win), losses=t.filter(x=>!x.win);
    const longs=t.filter(x=>x.direction==='Long'), shorts=t.filter(x=>x.direction==='Short');
    const lw=longs.filter(x=>x.win), sw=shorts.filter(x=>x.win);
    const totalPnl=t[t.length-1].cumPnl, totalPnlPct=t[t.length-1].cumPnlPct;
    const avgPnl=totalPnl/t.length;
    const avgWin=wins.length?wins.reduce((s,x)=>s+x.pnl,0)/wins.length:0;
    const avgLoss=losses.length?losses.reduce((s,x)=>s+x.pnl,0)/losses.length:0;
    const gp=wins.reduce((s,x)=>s+x.pnl,0), gl=Math.abs(losses.reduce((s,x)=>s+x.pnl,0));
    const pf=gl>0?gp/gl:Infinity;
    const best=Math.max(...t.map(x=>x.pnl)), worst=Math.min(...t.map(x=>x.pnl));
    const rr=avgLoss!==0?Math.abs(avgWin/avgLoss):0, wr=wins.length/t.length*100;
    const exp=wr/100*avgWin+(1-wr/100)*avgLoss;
    const initCap=t[0].effectiveCap||t[0].value, finalCap=initCap+totalPnl;
    const days=(t[t.length-1].exitTime-t[0].entryTime)/(1000*60*60*24), yrs=days/365.25;
    const cagr=yrs>0?(Math.pow(finalCap/initCap,1/yrs)-1)*100:0;
    const totalCharges=t.reduce((s,x)=>s+x.charges,0);
    const totalGross=t.reduce((s,x)=>s+x.grossPnl,0);
    const roc=initCap>0?(totalPnl/initCap*100):0;

    // Drawdown
    const eq=t.map(tr=>initCap+tr.cumPnl);
    let pk=eq[0], maxDD=0, maxDDPct=0;
    eq.forEach(v=>{if(v>pk)pk=v; const dd=v-pk; const ddp=(v-pk)/pk*100; if(dd<maxDD){maxDD=dd;maxDDPct=ddp;}});
    const recoveryFactor=maxDD!==0?Math.abs(totalPnl/maxDD):0;

    // Risk
    const rets=t.map(tr=>tr.pnlPct/100), meanR=rets.reduce((a,b)=>a+b,0)/rets.length;
    const std=Math.sqrt(rets.reduce((a,r)=>a+(r-meanR)**2,0)/rets.length);
    const downDev=Math.sqrt(rets.filter(r=>r<0).reduce((a,r)=>a+r**2,0)/rets.length);
    const tpy=t.length/days*252, annRet=meanR*tpy, annStd=std*Math.sqrt(tpy), annDD=downDev*Math.sqrt(tpy);
    const sharpe=annStd>0?annRet/annStd:0, sortino=annDD>0?annRet/annDD:0;
    const calmar=maxDDPct!==0?annRet/Math.abs(maxDDPct/100):0;
    const aW=t.filter(tr=>tr.win), aL=t.filter(tr=>!tr.win);
    const avgWPct=aW.length?aW.reduce((s,tr)=>s+Math.abs(tr.pnlPct),0)/aW.length:0;
    const avgLPct=aL.length?aL.reduce((s,tr)=>s+Math.abs(tr.pnlPct),0)/aL.length:0;
    const kelly=avgLPct>0?(wr/100-(1-wr/100)/(avgWPct/avgLPct))*100:0;

    // Streaks
    let maxWS=0,maxLS=0,cW=0,cL=0;
    t.forEach(tr=>{if(tr.win){cW++;cL=0;maxWS=Math.max(maxWS,cW);}else{cL++;cW=0;maxLS=Math.max(maxLS,cL);}});

    // Advanced
    const pcts=t.map(tr=>tr.pnlPct).sort((a,b)=>a-b);
    const N=pcts.length, meanP=pcts.reduce((a,b)=>a+b,0)/N;
    const stdP=Math.sqrt(pcts.reduce((a,r)=>a+(r-meanP)**2,0)/N);
    const var95=pcts[Math.floor(N*0.05)];
    const p95=pcts[Math.floor(N*0.95)];
    const tailRatio=var95!==0?Math.abs(p95/var95):0;
    const skew=stdP>0?(pcts.reduce((a,r)=>a+((r-meanP)/stdP)**3,0)/N):0;
    const kurt=stdP>0?(pcts.reduce((a,r)=>a+((r-meanP)/stdP)**4,0)/N)-3:0;
    const worst5c=Math.max(Math.floor(N*0.05),1);
    const cvarPct=pcts.slice(0,worst5c).reduce((a,b)=>a+b,0)/worst5c;

    const longWR=longs.length?lw.length/longs.length*100:0;
    const shortWR=shorts.length?sw.length/shorts.length*100:0;
    const longPnl=longs.reduce((s,x)=>s+x.pnl,0);
    const shortPnl=shorts.reduce((s,x)=>s+x.pnl,0);

    return {
      name: this.stratName || this.prefix.toUpperCase(),
      totalTrades: t.length,
      winRate: wr,
      totalPnl, totalPnlPct, grossPnl: totalGross, totalCharges,
      netPnl: totalPnl, roc,
      cagr, avgPnl, avgWin, avgLoss,
      bestTrade: best, worstTrade: worst,
      profitFactor: pf, riskReward: rr, expectancy: exp,
      maxDD, maxDDPct, recoveryFactor,
      sharpe, sortino, calmar, kelly,
      maxWinStreak: maxWS, maxLossStreak: maxLS,
      var95, p95gain: p95, tailRatio, skewness: skew, kurtosis: kurt, cvarPct,
      longWR, shortWR, longPnl, shortPnl,

  buildSummary(){

    const totalPnl=t[t.length-1].cumPnl,totalPnlPct=t[t.length-1].cumPnlPct,avgPnl=totalPnl/t.length;

    const avgLoss=losses.length?losses.reduce((s,x)=>s+x.pnl,0)/losses.length:0;
    const gp=wins.reduce((s,x)=>s+x.pnl,0),gl=Math.abs(losses.reduce((s,x)=>s+x.pnl,0));
    const pf=gl>0?gp/gl:Infinity,best=Math.max(...t.map(x=>x.pnl)),worst=Math.min(...t.map(x=>x.pnl));
    const rr=avgLoss!==0?Math.abs(avgWin/avgLoss):0,wr=wins.length/t.length*100;

  buildRiskMetrics(){
    const p=this.prefix,trades=this.trades;
    const rets=trades.map(t=>t.pnlPct/100),mean=rets.reduce((a,b)=>a+b,0)/rets.length;
    const std=Math.sqrt(rets.reduce((a,r)=>a+(r-mean)**2,0)/rets.length);
    const downDev=Math.sqrt(rets.filter(r=>r<0).reduce((a,r)=>a+r**2,0)/rets.length);
    const days=(trades[trades.length-1].exitTime-trades[0].entryTime)/(1000*60*60*24);
    const tpy=trades.length/days*252,annRet=mean*tpy,annStd=std*Math.sqrt(tpy),annDD=downDev*Math.sqrt(tpy);
    const sharpe=annStd>0?annRet/annStd:0,sortino=annDD>0?annRet/annDD:0;
    const initCap=trades[0].effectiveCap||trades[0].value,eq=trades.map(t=>initCap+t.cumPnl);
    let pk=eq[0],mxDD=0;eq.forEach(v=>{if(v>pk)pk=v;const dd=(v-pk)/pk;if(dd<mxDD)mxDD=dd;});
    const calmar=mxDD!==0?annRet/Math.abs(mxDD):0;
    const wr=trades.filter(t=>t.win).length/trades.length;
    const aW=trades.filter(t=>t.win),aL=trades.filter(t=>!t.win);
    const avgW=aW.length?aW.reduce((s,t)=>s+Math.abs(t.pnlPct),0)/aW.length:0;
    const avgL=aL.length?aL.reduce((s,t)=>s+Math.abs(t.pnlPct),0)/aL.length:0;
    const kelly=avgL>0?(wr-(1-wr)/(avgW/avgL))*100:0;
    const metrics=[
      {l:'SHARPE RATIO',f:fN(sharpe,2),c:sharpe>=2?CC.green:sharpe>=1?CC.yellow:CC.red,w:'Measures risk-adjusted return. How much return per unit of total risk (volatility).',m:'<code>Sharpe = Annualized Return / Annualized Std Dev</code>',i:'< 0 = losing money on risk-adjusted basis. 0–1 = suboptimal. 1–2 = good. 2–3 = very good. > 3 = excellent.'},
      {l:'SORTINO RATIO',f:fN(sortino,2),c:sortino>=2?CC.green:sortino>=1?CC.yellow:CC.red,w:'Like Sharpe but only penalizes downside volatility. Ignores upside swings.',m:'<code>Sortino = Annualized Return / Annualized Downside Deviation</code>',i:'Higher is better. > 2 = strong. Sortino > Sharpe = upside volatility is high (good).'},
      {l:'CALMAR RATIO',f:fN(calmar,2),c:calmar>=3?CC.green:calmar>=1?CC.yellow:CC.red,w:'Annualized return divided by max drawdown. Measures pain vs gain.',m:'<code>Calmar = Annualized Return / |Max Drawdown %|</code>',i:'< 1 = drawdown exceeds annual returns. 1–3 = acceptable. > 3 = excellent.'},
      {l:'KELLY CRITERION',f:fN(kelly,1)+'%',c:kelly>0?CC.green:CC.red,w:'Optimal fraction of capital to risk per trade to maximize long-term growth.',m:'<code>Kelly % = W - (1-W) / R</code> where W = win rate, R = avg win / avg loss.',i:'Positive = edge exists. Negative = no edge. Most use Half-Kelly (50%) for safety.'},
    ];
    document.getElementById(p+'-gauge-grid').innerHTML=metrics.map(m=>`<div class="gauge-card"><div class="gauge-label">${m.l}</div><div class="gauge-value" style="color:${m.c}">${m.f}</div>
      <div class="explainer"><div class="explainer-block"><h4>What is this?</h4><p>${m.w}</p></div><div class="explainer-block"><h4>The Math</h4><p>${m.m}</p></div><div class="explainer-block"><h4>How to Interpret</h4><p>${m.i}</p></div></div></div>`).join('');
  }

  buildMonteCarlo(){
    const p=this.prefix,trades=this.trades,self=this;
    const slider=document.getElementById(p+'-mc-slider'),simLabel=document.getElementById(p+'-mc-sim-label');
    function runMC(N){
      simLabel.textContent=N;
      const pnls=trades.map(t=>t.pnl),L=pnls.length,sims=[];
      for(let s=0;s<N;s++){const sh=[...pnls].sort(()=>Math.random()-0.5);const c=[0];let cum=0;sh.forEach(pp=>{cum+=pp;c.push(cum);});sims.push(c);}
      const labels=Array.from({length:L+1},(_,i)=>i);
      const pctiles=[5,25,50,75,95],pD={};pctiles.forEach(pp=>pD[pp]=[]);
      for(let i=0;i<=L;i++){const vals=sims.map(s=>s[i]).sort((a,b)=>a-b);pctiles.forEach(pp=>pD[pp].push(vals[Math.floor(vals.length*pp/100)]));}
      const fV=sims.map(s=>s[s.length-1]).sort((a,b)=>a-b);
      const probP=fV.filter(v=>v>0).length/N*100,med=fV[Math.floor(N/2)];
      const p5V=fV[Math.floor(N*0.05)],p95V=fV[Math.floor(N*0.95)];
      const mxDDs=sims.map(s=>{let pk2=0,mdd=0;s.forEach(v=>{if(v>pk2)pk2=v;const dd=pk2-v;if(dd>mdd)mdd=dd;});return mdd;});
      const avgMDD=mxDDs.reduce((a,b)=>a+b,0)/mxDDs.length;
      const d=cdf();
      const coneDS=[
        {label:'95th',data:pD[95],borderColor:CC.green+'40',backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:0.3,borderDash:[3,3]},
        {label:'5th–95th',data:pD[5],borderColor:CC.red+'40',backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:0.3,borderDash:[3,3],fill:{target:'-1',above:CC.green+'10',below:CC.red+'10'}},
        {label:'75th',data:pD[75],borderColor:CC.green+'25',backgroundColor:'transparent',borderWidth:0,pointRadius:0,tension:0.3},
        {label:'25th–75th',data:pD[25],borderColor:CC.red+'25',backgroundColor:'transparent',borderWidth:0,pointRadius:0,tension:0.3,fill:{target:'-1',above:CC.blue+'18',below:CC.blue+'18'}},
        {label:'Median',data:pD[50],borderColor:CC.yellow,backgroundColor:'transparent',borderWidth:3,pointRadius:0,tension:0.3},
      ];
      self.mkc(p+'-chart-monte',{type:'line',data:{labels,datasets:coneDS},options:{...d,plugins:{...d.plugins,legend:{labels:{...d.plugins.legend.labels,filter:item=>['Median','5th–95th','25th–75th'].includes(item.text)}}}}});
      document.getElementById(p+'-mc-stats').innerHTML=[
        {l:'PROB. OF PROFIT',v:fN(probP,1)+'%',c:probP>=50?'positive':'negative'},
        {l:'MEDIAN OUTCOME',v:fC(med),c:med>=0?'positive':'negative'},
        {l:'5TH–95TH RANGE',v:fC(p5V)+' → '+fC(p95V),c:'neutral'},
        {l:'AVG MAX DRAWDOWN',v:fC(-avgMDD),c:'negative'},
      ].map(k=>`<div class="stat-card"><div class="stat-name">${k.l}</div><div class="stat-val ${k.c}" style="font-size:14px">${k.v}</div></div>`).join('');
      const initCap=trades[0].effectiveCap||trades[0].value;
      const ruin20=sims.filter(s=>{let pk2=0;return s.some(v=>{if(v>pk2)pk2=v;return(pk2-v)>=initCap*0.20;});}).length/N*100;
      const ruin30=sims.filter(s=>{let pk2=0;return s.some(v=>{if(v>pk2)pk2=v;return(pk2-v)>=initCap*0.30;});}).length/N*100;
      const ruin50=sims.filter(s=>{let pk2=0;return s.some(v=>{if(v>pk2)pk2=v;return(pk2-v)>=initCap*0.50;});}).length/N*100;
      const recoveries=sims.map(s=>{let pk2=0,mddIdx=0,mdd=0;s.forEach((v,i)=>{if(v>pk2)pk2=v;const dd=pk2-v;if(dd>mdd){mdd=dd;mddIdx=i;}});let pb=0;for(let i=0;i<=mddIdx;i++)if(s[i]>pb)pb=s[i];for(let i=mddIdx;i<s.length;i++){if(s[i]>=pb)return i-mddIdx;}return s.length-mddIdx;});
      document.getElementById(p+'-mc-ruin-kpis').innerHTML=[
        {l:'PROB. -20% DD',v:fN(ruin20,1)+'%',c:ruin20<=20?'positive':'negative'},
        {l:'PROB. -30% DD',v:fN(ruin30,1)+'%',c:ruin30<=10?'positive':'negative'},
        {l:'PROB. -50% DD',v:fN(ruin50,1)+'%',c:ruin50<=5?'positive':'negative'},
        {l:'AVG RECOVERY',v:fN(recoveries.reduce((a,b)=>a+b,0)/recoveries.length,0)+' trades',c:'neutral'},
      ].map(k=>`<div class="stat-card"><div class="stat-name">${k.l}</div><div class="stat-val ${k.c}">${k.v}</div></div>`).join('');
      // DD dist + recovery charts
      const ddBinCount=15,ddMax2=Math.max(...mxDDs),ddStep=(ddMax2)/ddBinCount;
      const ddBins=Array.from({length:ddBinCount},(_,i)=>({lo:i*ddStep,hi:(i+1)*ddStep,count:0}));
      mxDDs.forEach(v=>{const idx=Math.min(Math.floor(v/ddStep),ddBinCount-1);if(idx>=0)ddBins[idx].count++;});
      const dd95=mxDDs.slice().sort((a,b)=>a-b)[Math.floor(N*0.95)];
      self.mkc(p+'-chart-mc-dd-dist',{type:'bar',data:{labels:ddBins.map(b=>'₹'+fN(b.lo,0)),datasets:[{label:'Frequency',data:ddBins.map(b=>b.count),backgroundColor:ddBins.map(b=>b.lo<=dd95?CC.red+'66':CC.red+'cc'),borderRadius:2}]},options:{...d,plugins:{...d.plugins,legend:{display:false},
        annotation:{annotations:{p95line:{type:'line',xMin:null,xMax:null,
          yMin:0,yMax:Math.max(...ddBins.map(b=>b.count)),
          borderColor:CC.yellow,borderWidth:2,borderDash:[6,3],
          label:{display:true,content:'95th %ile: ₹'+fN(dd95,0),position:'start',backgroundColor:CC.yellow+'33',color:CC.yellow,font:{family:"'Space Mono',monospace",size:10}}
        }}}
      }}});
      const recBuckets=[{l:'1-5',mn:1,mx:6},{l:'6-10',mn:6,mx:11},{l:'11-20',mn:11,mx:21},{l:'21-40',mn:21,mx:41},{l:'41-80',mn:41,mx:81},{l:'80+',mn:81,mx:Infinity}];
      self.mkc(p+'-chart-mc-recovery',{type:'bar',data:{labels:recBuckets.map(b=>b.l+' trades'),datasets:[{label:'Simulations',data:recBuckets.map(b=>recoveries.filter(r=>r>=b.mn&&r<b.mx).length),backgroundColor:CC.cyan,borderRadius:4}]},options:{...d,plugins:{...d.plugins,legend:{display:false}}}});

      document.getElementById(p+'-mc-explainer').innerHTML=`<div class="explainer">
        <div class="explainer-block"><h4>What is this?</h4><p>Monte Carlo simulation randomly reshuffles your ${trades.length} trade results ${N} times to create alternative equity curves. The confidence cone shows the range of outcomes. Probability of ruin measures how often simulations hit dangerous drawdown levels.</p></div>
        <div class="explainer-block"><h4>The Math</h4><p><code>For each sim: randomly shuffle all trade P&Ls → compute cumulative curve</code><br>Repeat ${N} times. The cone shows: outer band = 5th–95th percentile, inner band = 25th–75th percentile, center = median.<br><code>Prob. of Ruin = % of sims where drawdown exceeds X% of starting capital</code><br><code>Recovery = trades from max DD trough to regaining the previous peak</code></p></div>
        <div class="explainer-block"><h4>How to Interpret</h4><p><b>Confidence Cone:</b> Narrow cone = consistent strategy. Wide cone = high variance. If the 5th percentile stays above zero, your edge is strong.<br><b>Prob. of Ruin:</b> Below 10% for -30% DD is excellent. Above 30% = your strategy has significant tail risk.<br><b>Recovery:</b> If most sims recover in under 20 trades, your strategy bounces back quickly. Longer recovery = painful drawdown periods.<br><b>DD Distribution:</b> The yellow line marks 95th percentile — 95% of simulations had a max drawdown below this value.</p></div>
      </div>`;
    }
    runMC(+slider.value);
    slider.onchange=function(){runMC(+this.value);};
    slider.oninput=function(){simLabel.textContent=this.value;};
  }

  buildDOW(){
    const p=this.prefix,trades=this.trades;
    const days=['Mon','Tue','Wed','Thu','Fri'];
    const dd=days.map((name,i)=>{const dt=trades.filter(t=>t.entryTime.getDay()===i+1);return{day:name,count:dt.length,avgPnl:dt.length?dt.reduce((s,t)=>s+t.pnl,0)/dt.length:0};});
    const d=cdf();
    this.mkc(p+'-chart-dow-pnl',{type:'bar',data:{labels:days,datasets:[{label:'Avg P&L ₹',data:dd.map(x=>x.avgPnl),backgroundColor:dd.map(x=>x.avgPnl>=0?CC.green:CC.red),borderRadius:4}]},options:{...d,plugins:{...d.plugins,legend:{display:false}}}});
    this.mkc(p+'-chart-dow-count',{type:'bar',data:{labels:days,datasets:[{label:'Count',data:dd.map(x=>x.count),backgroundColor:CC.cyan,borderRadius:4}]},options:{...d,plugins:{...d.plugins,legend:{display:false}}}});
  }

  buildHourOfDay(){
    const p=this.prefix,trades=this.trades,d=cdf();
    const hourMap={};
    trades.forEach(t=>{const h=t.entryTime.getHours();if(!hourMap[h])hourMap[h]={pnls:[],wins:0,count:0};hourMap[h].pnls.push(t.pnl);hourMap[h].count++;if(t.win)hourMap[h].wins++;});
    const hours=Object.keys(hourMap).map(Number).sort((a,b)=>a-b);
    const labels=hours.map(h=>String(h).padStart(2,'0')+':00');
    const avgPnls=hours.map(h=>hourMap[h].pnls.reduce((s,v)=>s+v,0)/hourMap[h].count);
    const counts=hours.map(h=>hourMap[h].count);
    const winRates=hours.map(h=>hourMap[h].count>0?(hourMap[h].wins/hourMap[h].count*100):0);
    const totPnls=hours.map(h=>hourMap[h].pnls.reduce((s,v)=>s+v,0));
    this.mkc(p+'-chart-hour-pnl',{type:'bar',data:{labels,datasets:[{label:'Avg P&L ₹',data:avgPnls,backgroundColor:avgPnls.map(v=>v>=0?CC.green:CC.red),borderRadius:4}]},options:{...d,plugins:{...d.plugins,legend:{display:false}}}});
    this.mkc(p+'-chart-hour-count',{type:'bar',data:{labels,datasets:[{label:'Trades',data:counts,backgroundColor:CC.cyan,borderRadius:4}]},options:{...d,plugins:{...d.plugins,legend:{display:false}}}});
    this.mkc(p+'-chart-hour-wr',{type:'bar',data:{labels,datasets:[{label:'WR %',data:winRates,backgroundColor:winRates.map(v=>v>=50?CC.green:CC.red),borderRadius:4}]},options:{...d,plugins:{...d.plugins,legend:{display:false}},scales:{...d.scales,y:{...d.scales.y,min:0,max:100}}}});
    this.mkc(p+'-chart-hour-totpnl',{type:'bar',data:{labels,datasets:[{label:'Total P&L ₹',data:totPnls,backgroundColor:totPnls.map(v=>v>=0?CC.green:CC.red),borderRadius:4}]},options:{...d,plugins:{...d.plugins,legend:{display:false}}}});
    const bestIdx=avgPnls.indexOf(Math.max(...avgPnls)),worstIdx=avgPnls.indexOf(Math.min(...avgPnls));
    const mostActiveIdx=counts.indexOf(Math.max(...counts));
    document.getElementById(p+'-hour-kpis').innerHTML=[
      {l:'BEST HOUR',v:labels[bestIdx],c:'positive',s:'Avg P&L: ₹'+fN(avgPnls[bestIdx],2)},
      {l:'WORST HOUR',v:labels[worstIdx],c:'negative',s:'Avg P&L: ₹'+fN(avgPnls[worstIdx],2)},
      {l:'MOST ACTIVE HOUR',v:labels[mostActiveIdx],c:'accent',s:counts[mostActiveIdx]+' trades'},
      {l:'BEST WIN RATE HOUR',v:labels[winRates.indexOf(Math.max(...winRates))],c:'positive',s:fN(Math.max(...winRates),1)+'%'},
    ].map(k=>`<div class="stat-card"><div class="stat-name">${k.l}</div><div class="stat-val ${k.c}">${k.v}</div>${k.s?'<div class="stat-sub">'+k.s+'</div>':''}</div>`).join('');

    document.getElementById(p+'-hour-explainer').innerHTML=`<div class="explainer">
      <div class="explainer-block"><h4>What is this?</h4><p>Breaks down your trading performance by the hour you entered each trade. In Indian markets (9:15–15:30), different hours exhibit distinct characteristics — opening volatility, lunch lull, closing momentum.</p></div>
      <div class="explainer-block"><h4>The Math</h4><p><code>For each hour H: Avg P&L = sum of P&L of trades entered at hour H ÷ count</code><br><code>Win Rate = wins at hour H ÷ total trades at hour H × 100</code><br>Entry hour is extracted from the entry timestamp of each trade.</p></div>
      <div class="explainer-block"><h4>How to Interpret</h4><p>If certain hours consistently lose money, consider avoiding entries at those times. High win rate + low avg P&L = small winners. Low win rate + high avg P&L = catching big moves. The most active hour shows when your signals trigger most. If a specific hour has < 10 trades, treat its stats cautiously — small sample.</p></div></div>`;
  }

  buildSeasonality(){
    const p=this.prefix,trades=this.trades,d=cdf();
    const mNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const monthMap={};for(let m=0;m<12;m++)monthMap[m]={pnls:[],wins:0,count:0};
    trades.forEach(t=>{const m=(t.exitTime||t.entryTime).getMonth();monthMap[m].pnls.push(t.pnl);monthMap[m].count++;if(t.win)monthMap[m].wins++;});
    const avgPnls=mNames.map((_,m)=>monthMap[m].count>0?monthMap[m].pnls.reduce((s,v)=>s+v,0)/monthMap[m].count:0);
    const totPnls=mNames.map((_,m)=>monthMap[m].pnls.reduce((s,v)=>s+v,0));
    const counts=mNames.map((_,m)=>monthMap[m].count);
    const winRates=mNames.map((_,m)=>monthMap[m].count>0?(monthMap[m].wins/monthMap[m].count*100):0);
    this.mkc(p+'-chart-season-pnl',{type:'bar',data:{labels:mNames,datasets:[
      {label:'Avg P&L ₹',data:avgPnls,backgroundColor:avgPnls.map(v=>v>=0?CC.green:CC.red),borderRadius:4,order:2},
      {label:'Total P&L ₹',data:totPnls,type:'line',borderColor:CC.blue,borderWidth:2.5,tension:0.3,pointRadius:4,pointBackgroundColor:CC.blue,fill:false,order:1}
    ]},options:{...d}});
    this.mkc(p+'-chart-season-wr',{type:'bar',data:{labels:mNames,datasets:[{label:'WR %',data:winRates,backgroundColor:winRates.map(v=>v>=50?CC.green+'bb':CC.red+'bb'),borderRadius:4}]},options:{...d,plugins:{...d.plugins,legend:{display:false}},scales:{...d.scales,y:{...d.scales.y,min:0,max:100}}}});
    this.mkc(p+'-chart-season-count',{type:'bar',data:{labels:mNames,datasets:[{label:'Count',data:counts,backgroundColor:CC.cyan,borderRadius:4}]},options:{...d,plugins:{...d.plugins,legend:{display:false}}}});
    const activeMonths=mNames.map((_,m)=>m).filter(m=>monthMap[m].count>0);
    const bestM=activeMonths.length?activeMonths.reduce((a,b)=>avgPnls[a]>avgPnls[b]?a:b,activeMonths[0]):0;
    const worstM=activeMonths.length?activeMonths.reduce((a,b)=>avgPnls[a]<avgPnls[b]?a:b,activeMonths[0]):0;
    const profMonths=activeMonths.filter(m=>totPnls[m]>0).length;
    document.getElementById(p+'-season-kpis').innerHTML=[
      {l:'BEST MONTH',v:mNames[bestM],c:'positive',s:'Avg P&L: ₹'+fN(avgPnls[bestM],2)},
      {l:'WORST MONTH',v:mNames[worstM],c:'negative',s:'Avg P&L: ₹'+fN(avgPnls[worstM],2)},
      {l:'PROFITABLE MONTHS',v:profMonths+' / '+activeMonths.length,c:profMonths>activeMonths.length/2?'positive':'negative'},
      {l:'HIGHEST WIN RATE',v:mNames[winRates.indexOf(Math.max(...activeMonths.map(m=>winRates[m])))],c:'positive',s:fN(Math.max(...activeMonths.map(m=>winRates[m])),1)+'%'},
    ].map(k=>`<div class="stat-card"><div class="stat-name">${k.l}</div><div class="stat-val ${k.c}">${k.v}</div>${k.s?'<div class="stat-sub">'+k.s+'</div>':''}</div>`).join('');

    document.getElementById(p+'-season-explainer').innerHTML=`<div class="explainer">
      <div class="explainer-block"><h4>What is this?</h4><p>Aggregates your trading performance by calendar month across all years. Reveals seasonal patterns — budget months (Feb), earnings seasons (Apr–May, Jul–Aug, Oct–Nov), and holiday months (Dec) often show distinct behaviour in Indian markets.</p></div>
      <div class="explainer-block"><h4>The Math</h4><p><code>For each month M: Avg P&L = sum of P&L of all trades exiting in month M (across all years) ÷ count</code><br><code>Total P&L = sum of all trade P&Ls exiting in month M</code><br>The line overlay shows total cumulative contribution of each month.</p></div>
      <div class="explainer-block"><h4>How to Interpret</h4><p>Months that are consistently red across years may indicate structural difficulty for your strategy in those periods. Consider reducing size during historically weak months and sizing up during strong ones. A month with high avg P&L but low trade count may be a small-sample anomaly — check if it repeats across years in the monthly heatmap above.</p></div></div>`;
  }

  buildAdvStats(){
    const p=this.prefix,trades=this.trades,d=cdf();
    const pnls=trades.map(t=>t.pnl).sort((a,b)=>a-b);
    const pcts=trades.map(t=>t.pnlPct).sort((a,b)=>a-b);
    const N=pnls.length,mean=pcts.reduce((a,b)=>a+b,0)/N;
    const var95Idx=Math.floor(N*0.05),var95Pct=pcts[var95Idx],var95Inr=pnls[var95Idx];
    const var99Idx=Math.floor(N*0.01),var99Pct=pcts[var99Idx],var99Inr=pnls[var99Idx];
    const worst5Count=Math.max(Math.floor(N*0.05),1);
    const cvarPct=pcts.slice(0,worst5Count).reduce((a,b)=>a+b,0)/worst5Count;
    const cvarInr=pnls.slice(0,worst5Count).reduce((a,b)=>a+b,0)/worst5Count;
    const worst1Count=Math.max(Math.floor(N*0.01),1);
    const cvar99Inr=pnls.slice(0,worst1Count).reduce((a,b)=>a+b,0)/worst1Count;
    const p95=pcts[Math.floor(N*0.95)],p5=pcts[Math.floor(N*0.05)];
    const tailRatio=p5!==0?Math.abs(p95/p5):0;
    const std=Math.sqrt(pcts.reduce((a,r)=>a+(r-mean)**2,0)/N);
    const skewness=std>0?(pcts.reduce((a,r)=>a+((r-mean)/std)**3,0)/N):0;
    const kurtosis=std>0?(pcts.reduce((a,r)=>a+((r-mean)/std)**4,0)/N)-3:0;
    const metrics=[
      {l:'CVaR (95%) — EXPECTED SHORTFALL',
       f:'₹'+fN(cvarInr,2)+' ('+fN(cvarPct,2)+'%)',
       c:CC.red,
       w:'Conditional Value at Risk (CVaR), also called Expected Shortfall, is the <b>average loss in the worst 5% of trades</b>. While VaR tells you "the loss you won\'t exceed 95% of the time," CVaR answers the more important question: "when things go bad, how bad do they actually get?"',
       m:'<code>1. Sort all trade P&Ls from worst to best</code><br><code>2. Take the bottom 5% of trades (worst '+worst5Count+' trades out of '+N+')</code><br><code>3. CVaR = average P&L of those '+worst5Count+' worst trades</code><br><br>Your worst 5% trades: ['+pnls.slice(0,worst5Count).map(v=>'₹'+fN(v,0)).join(', ')+']<br>Average = <b>₹'+fN(cvarInr,2)+'</b>',
       i:'Your CVaR of ₹'+fN(cvarInr,2)+' means that in your worst 5% of trades, you lose ₹'+fN(Math.abs(cvarInr),0)+' on average. Compare this to your average win — if CVaR is more than 3× your avg win, your tail risk may be too large.'},
      {l:'TAIL RATIO',
       f:fN(tailRatio,2),
       c:tailRatio>=1?CC.green:CC.red,
       w:'The Tail Ratio measures the <b>symmetry of your best vs worst outcomes</b>. It compares the size of your 95th percentile gain to the size of your 5th percentile loss.',
       m:'<code>Tail Ratio = |95th Percentile P&L %| / |5th Percentile P&L %|</code><br><br>Your 95th percentile (big win): <b>'+fN(p95,2)+'%</b><br>Your 5th percentile (big loss): <b>'+fN(p5,2)+'%</b><br>Tail Ratio = <b>'+fN(tailRatio,2)+'</b>',
       i:'Tail Ratio > 1.0 = your big wins are larger than your big losses — ideal.<br>Tail Ratio = 1.0 = symmetric.<br>Tail Ratio < 1.0 = your big losses are larger than your big wins — dangerous. Below 0.5 is a serious red flag.'},
      {l:'SKEWNESS',
       f:fN(skewness,3),
       c:skewness>0?CC.green:skewness<-0.5?CC.red:CC.yellow,
       w:'Skewness measures whether your return distribution <b>leans to one side</b>. Positive skew = occasional large wins. Negative skew = occasional large losses.',
       m:'<code>Skewness = (1/N) × Σ [(rᵢ - mean) / σ]³</code><br><br>Your mean: '+fN(mean,3)+'%, σ: '+fN(std,3)+'%, Skewness: <b>'+fN(skewness,3)+'</b>',
       i:'Skewness > 0 (positive): Right tail is longer — some large winning outliers. <b>Preferred for trend-following strategies.</b><br>Skewness ≈ 0: Symmetric returns.<br>Skewness < 0 (negative): Left tail is longer — dangerous if combined with low tail ratio.'},
      {l:'EXCESS KURTOSIS',
       f:fN(kurtosis,3),
       c:kurtosis<=1?CC.green:kurtosis<=3?CC.yellow:CC.red,
       w:'Kurtosis measures how <b>"fat" the tails</b> of your return distribution are compared to a normal distribution. Positive = more extreme events than expected.',
       m:'<code>Excess Kurtosis = [(1/N) × Σ ((rᵢ - mean) / σ)⁴] - 3</code><br><br>The "−3" subtracts the normal distribution kurtosis. Zero = normal, positive = fat tails.<br>Your Excess Kurtosis: <b>'+fN(kurtosis,3)+'</b>',
       i:'≈ 0: Normal tail behaviour. Sharpe ratio is meaningful.<br>1–3: Moderately fat tails. Extremes happen more often than expected.<br>> 3: Very fat tails — Sharpe understates risk. Use Sortino or CVaR instead.<br>< 0: Thinner tails — very stable, few surprises.'},
    ];
    document.getElementById(p+'-advstats-grid').innerHTML=metrics.map(m=>`<div class="gauge-card"><div class="gauge-label">${m.l}</div><div class="gauge-value" style="color:${m.c}">${m.f}</div>
      <div class="explainer"><div class="explainer-block"><h4>What is this?</h4><p>${m.w}</p></div><div class="explainer-block"><h4>The Math</h4><p>${m.m}</p></div><div class="explainer-block"><h4>How to Interpret</h4><p>${m.i}</p></div></div></div>`).join('');
    document.getElementById(p+'-advstats-kpis').innerHTML=[
      {l:'VaR (95%)',v:'₹'+fN(var95Inr,2),c:'negative',s:fN(var95Pct,2)+'% — 95% of trades lose less than this'},
      {l:'VaR (99%)',v:'₹'+fN(var99Inr,2),c:'negative',s:fN(var99Pct,2)+'% — 99% of trades lose less than this'},
      {l:'CVaR (99%)',v:'₹'+fN(cvar99Inr,2),c:'negative',s:'Avg loss in worst 1% ('+worst1Count+' trades)'},
      {l:'95TH PCTL GAIN',v:fN(p95,2)+'%',c:'positive',s:'Your big winners reach at least this'},
      {l:'5TH PCTL LOSS',v:fN(p5,2)+'%',c:'negative',s:'Your big losers reach at least this'},
      {l:'STD DEVIATION',v:fN(std,3)+'%',c:'neutral',s:'Per-trade volatility of returns'},
    ].map(k=>`<div class="stat-card"><div class="stat-name">${k.l}</div><div class="stat-val ${k.c}">${k.v}</div>${k.s?'<div class="stat-sub">'+k.s+'</div>':''}</div>`).join('');
    // Charts
    const allPcts=trades.map(t=>t.pnlPct);
    const binCount=25,mn=Math.min(...allPcts),mx=Math.max(...allPcts),st2=(mx-mn)/binCount;
    const bins=Array.from({length:binCount},(_,i)=>({lo:mn+i*st2,hi:mn+(i+1)*st2,count:0}));
    allPcts.forEach(v=>{const idx=Math.min(Math.floor((v-mn)/st2),binCount-1);if(idx>=0)bins[idx].count++;});
    const maxCount=Math.max(...bins.map(b=>b.count));
    this.mkc(p+'-chart-advstats-dist',{type:'bar',data:{labels:bins.map(b=>fN(b.lo,1)+'%'),datasets:[{label:'Frequency',data:bins.map(b=>b.count),backgroundColor:bins.map(b=>{const mid=(b.lo+b.hi)/2;if(mid<=cvarPct)return CC.red;if(mid<=var95Pct)return CC.yellow+'cc';return mid>=0?CC.green+'99':CC.red+'77';}),borderRadius:2}]},options:{...d,plugins:{...d.plugins,legend:{display:false},
      annotation:{annotations:{
        varLine:{type:'line',xMin:null,xMax:null,yMin:0,yMax:maxCount,borderColor:CC.yellow,borderWidth:2,borderDash:[6,3],
          label:{display:true,content:'VaR 95%: '+fN(var95Pct,1)+'%',position:'start',backgroundColor:CC.yellow+'44',color:CC.yellow,font:{family:"'Space Mono',monospace",size:9}}},
        cvarLine:{type:'line',xMin:null,xMax:null,yMin:0,yMax:maxCount,borderColor:CC.red,borderWidth:2,borderDash:[4,4],
          label:{display:true,content:'CVaR: '+fN(cvarPct,1)+'%',position:'start',backgroundColor:CC.red+'44',color:CC.red,font:{family:"'Space Mono',monospace",size:9}}}
      }}
    }}});
    const worst10=trades.slice().sort((a,b)=>a.pnl-b.pnl).slice(0,10);
    const best10=trades.slice().sort((a,b)=>b.pnl-a.pnl).slice(0,10);
    const tailLabels=[...worst10.map(t=>'#'+t.num+' (L)'),...best10.map(t=>'#'+t.num+' (W)')];
    const tailData=[...worst10.map(t=>t.pnlPct),...best10.map(t=>t.pnlPct)];
    const tailColors=[...worst10.map(()=>CC.red),...best10.map(()=>CC.green)];
    this.mkc(p+'-chart-advstats-tails',{type:'bar',data:{labels:tailLabels,datasets:[{label:'P&L %',data:tailData,backgroundColor:tailColors,borderRadius:3}]},options:{...d,plugins:{...d.plugins,legend:{display:false}},indexAxis:'y'}});
  }

  buildIndividual(){
    const p=this.prefix,trades=this.trades,d=cdf(),wins=trades.filter(t=>t.win),losses=trades.filter(t=>!t.win);
    const avgWP=wins.length?wins.reduce((s,t)=>s+t.pnlPct,0)/wins.length:0;
    const avgLP=losses.length?losses.reduce((s,t)=>s+t.pnlPct,0)/losses.length:0;
    this.mkc(p+'-chart-individual',{type:'bar',data:{labels:trades.map(t=>'#'+t.num),datasets:[{label:'P&L %',data:trades.map(t=>t.pnlPct),backgroundColor:trades.map(t=>t.pnlPct>=0?CC.green+'cc':CC.red+'cc'),borderRadius:1}]},options:{...d,plugins:{...d.plugins,legend:{display:false}}}});
    document.getElementById(p+'-avg-metric-row').innerHTML=`
      <div class="avg-metric-card"><div class="amc-label">AVG WIN %</div><div class="amc-value" style="color:${CC.green}">${fN(avgWP,2)}%</div></div>
      <div class="avg-metric-card"><div class="amc-label">AVG LOSS %</div><div class="amc-value" style="color:${CC.red}">${fN(avgLP,2)}%</div></div>
      <div class="avg-metric-card"><div class="amc-label">BEST TRADE</div><div class="amc-value" style="color:${CC.green}">${fN(Math.max(...trades.map(t=>t.pnlPct)),2)}%</div></div>
      <div class="avg-metric-card"><div class="amc-label">WORST TRADE</div><div class="amc-value" style="color:${CC.red}">${fN(Math.min(...trades.map(t=>t.pnlPct)),2)}%</div></div>`;
  }

  buildTradeTable(){
    const p=this.prefix,trades=this.trades;
    let sC=null,sD=1,fDir='all',sT='',pg=0;const pp=20;
    const self=this;
    function render(){
      let data=[...trades];
      if(fDir!=='all')data=data.filter(t=>t.direction.toLowerCase()===fDir);
      if(sT)data=data.filter(t=>t.signal.toLowerCase().includes(sT)||t.direction.toLowerCase().includes(sT)||String(t.num).includes(sT));
      if(sC!==null)data.sort((a,b)=>{let va=a[sC],vb=b[sC];if(typeof va==='string')return va.localeCompare(vb)*sD;return(va-vb)*sD;});
      const tp=Math.ceil(data.length/pp),pd=data.slice(pg*pp,(pg+1)*pp);
      const cols=[{k:'num',l:'#'},{k:'direction',l:'Dir'},{k:'entryTime',l:'Entry Time'},{k:'exitTime',l:'Exit Time'},{k:'entryPrice',l:'Entry ₹'},{k:'exitPrice',l:'Exit ₹'},{k:'signal',l:'Signal'},{k:'qty',l:'Qty'},{k:'grossPnl',l:'Gross P&L'},{k:'charges',l:'Charges'},{k:'pnl',l:'Net P&L'},{k:'pnlPct',l:'Net %'},{k:'durationDays',l:'Duration'},{k:'cumPnl',l:'Cum P&L'}];
      const wrap=document.getElementById(p+'-trade-table-wrap');
      wrap.innerHTML=`
        <div class="table-toolbar"><input type="text" placeholder="Search..." id="${p}-tt-search" value="${sT}"><select id="${p}-tt-filter"><option value="all"${fDir==='all'?' selected':''}>All</option><option value="long"${fDir==='long'?' selected':''}>Long</option><option value="short"${fDir==='short'?' selected':''}>Short</option></select></div>
        <div style="overflow-x:auto;"><table class="data-table"><thead><tr>${cols.map(c=>`<th data-col="${c.k}">${c.l}${sC===c.k?(sD===1?' ▲':' ▼'):''}</th>`).join('')}</tr></thead>
        <tbody>${pd.map(t=>`<tr><td>${t.num}</td><td><span class="tl-badge ${t.direction.toLowerCase()}">${t.direction}</span></td><td>${fDT(t.entryTime)}</td><td>${fDT(t.exitTime)}</td><td>${fN(t.entryPrice,2)}</td><td>${fN(t.exitPrice,2)}</td><td>${t.signal}</td><td>${t.qty}</td><td style="color:${t.grossPnl>=0?CC.green:CC.red}">${fC(t.grossPnl)}</td><td style="color:var(--loss)">₹${fN(t.charges,2)}</td><td style="color:${t.pnl>=0?CC.green:CC.red};font-weight:700">${fC(t.pnl)}</td><td style="color:${t.pnlPct>=0?CC.green:CC.red}">${fN(t.pnlPct,2)}%</td><td>${fDur(t.durationDays)}</td><td style="color:${t.cumPnl>=0?CC.green:CC.red}">${fC(t.cumPnl)}</td></tr>`).join('')}</tbody></table></div>
        <div class="table-pagination"><button id="${p}-tt-prev"${pg===0?' disabled':''}>← PREV</button><span>PAGE ${pg+1} / ${tp} (${data.length})</span><button id="${p}-tt-next"${pg>=tp-1?' disabled':''}>NEXT →</button></div>`;
      document.getElementById(p+'-tt-search').addEventListener('input',e=>{sT=e.target.value.toLowerCase();pg=0;render();});
      document.getElementById(p+'-tt-filter').addEventListener('change',e=>{fDir=e.target.value;pg=0;render();});
      document.getElementById(p+'-tt-prev').addEventListener('click',()=>{if(pg>0){pg--;render();}});
      document.getElementById(p+'-tt-next').addEventListener('click',()=>{if(pg<tp-1){pg++;render();}});
      wrap.querySelectorAll('th[data-col]').forEach(th=>{th.addEventListener('click',()=>{const c=th.dataset.col;if(sC===c)sD*=-1;else{sC=c;sD=1;}render();});});
    }
    render();
  }

  buildRolling(){
    const p=this.prefix,trades=this.trades,d=cdf(),labels=trades.map(t=>'#'+t.num);
    const rP=trades.map((t,i)=>{if(i<9)return null;return trades.slice(i-9,i+1).reduce((s,x)=>s+x.pnl,0)/10;});
    // Rolling win rates: 20, 50, 100 trade windows
    const rW20=trades.map((t,i)=>{if(i<19)return null;return trades.slice(i-19,i+1).filter(x=>x.win).length/20*100;});
    const rW50=trades.map((t,i)=>{if(i<49)return null;return trades.slice(i-49,i+1).filter(x=>x.win).length/50*100;});
    const rW100=trades.map((t,i)=>{if(i<99)return null;return trades.slice(i-99,i+1).filter(x=>x.win).length/100*100;});
    this.mkc(p+'-chart-roll-pnl',{type:'line',data:{labels,datasets:[{label:'10-Trade Avg P&L ₹',data:rP,borderColor:CC.blue,borderWidth:2.5,tension:0.3,pointRadius:0,fill:{target:'origin',above:CC.greenBg,below:CC.redBg},spanGaps:true}]},options:{...d,plugins:{...d.plugins,legend:{display:false}}}});
    this.mkc(p+'-chart-roll-wr',{type:'line',data:{labels,datasets:[
      {label:'20-Trade WR',data:rW20,borderColor:CC.cyan,borderWidth:2,tension:0.3,pointRadius:0,spanGaps:true},
      {label:'50-Trade WR',data:rW50,borderColor:CC.blue,borderWidth:2,tension:0.3,pointRadius:0,spanGaps:true},
      {label:'100-Trade WR',data:rW100,borderColor:CC.purple,borderWidth:2,tension:0.3,pointRadius:0,spanGaps:true},
      {label:'25% Line',data:Array(trades.length).fill(25),borderColor:CC.yellow+'44',borderWidth:1,borderDash:[4,4],pointRadius:0}
    ]},options:d});
    document.getElementById(p+'-roll-pnl-explainer').innerHTML=`<div class="explainer">
      <div class="explainer-block"><h4>What is this?</h4><p>The rolling 10-trade average P&L smooths out individual trade noise and shows whether your strategy's profitability is improving, stable, or degrading over time.</p></div>
      <div class="explainer-block"><h4>The Math</h4><p><code>At trade N: avg P&L = sum of P&L from trade (N-9) to N ÷ 10</code><br>A moving window that slides one trade at a time.</p></div>
      <div class="explainer-block"><h4>How to Interpret</h4><p>Rising line = strategy improving. Falling = degrading. Consistently above zero = profitable edge. Crossing below zero = recent trades are net losing — review your rules.</p></div></div>`;
    document.getElementById(p+'-roll-wr-explainer').innerHTML=`<div class="explainer">
      <div class="explainer-block"><h4>What is this?</h4><p>Rolling win rate at three windows: 20-trade (fast/reactive), 50-trade (medium-term trend), and 100-trade (long-term baseline). Multiple windows help distinguish noise from real edge decay.</p></div>
      <div class="explainer-block"><h4>The Math</h4><p><code>At trade N: WR(w) = (wins in trades N-(w-1) to N) / w × 100</code><br>The yellow dashed line at 25% is the minimum edge reference. Below this, even strong R:R strategies struggle.</p></div>
      <div class="explainer-block"><h4>How to Interpret</h4><p>All three lines above 25% = healthy. If the 20-trade line drops but 100-trade holds = temporary slump. If 100-trade is falling = structural edge degradation. Divergence between fast and slow = regime transition.</p></div></div>`;
  }
}

// ========== INSTANTIATE TWO ENGINES ==========
const stratA = new StrategyEngine('sa', document.getElementById('content-a'), 'var(--stratA)');
const stratB = new StrategyEngine('sb', document.getElementById('content-b'), 'var(--stratB)');

// ========== COMPARISON TAB ==========
function buildComparison() {
  const mA = stratA.getMetrics();
  const mB = stratB.getMetrics();
  if (!mA || !mB) {
    document.getElementById('vs-empty').style.display = 'block';
    document.getElementById('vs-content').style.display = 'none';
    return;
  }
  document.getElementById('vs-empty').style.display = 'none';
  document.getElementById('vs-content').style.display = 'block';

  // Define comparison metrics: [label, key, format, higherIsBetter]
  const sections = [
    { title: 'PERFORMANCE', metrics: [
      ['Total Trades', 'totalTrades', 'int', true],
      ['Win Rate', 'winRate', 'pct1', true],
      ['Net P&L', 'totalPnl', 'inr', true],
      ['Net P&L %', 'totalPnlPct', 'pct2', true],
      ['Gross P&L', 'grossPnl', 'inr', true],
      ['Total Charges', 'totalCharges', 'inr', false],
      ['ROC %', 'roc', 'pct2', true],
      ['CAGR', 'cagr', 'pct2', true],
    ]},
    { title: 'TRADE QUALITY', metrics: [
      ['Avg P&L / Trade', 'avgPnl', 'inr', true],
      ['Avg Win', 'avgWin', 'inr', true],
      ['Avg Loss', 'avgLoss', 'inr', false], // less negative is better
      ['Best Trade', 'bestTrade', 'inr', true],
      ['Worst Trade', 'worstTrade', 'inr', false], // less negative is better
      ['Profit Factor', 'profitFactor', 'num2', true],
      ['Risk-Reward', 'riskReward', 'num2', true],
      ['Expectancy', 'expectancy', 'inr', true],
    ]},
    { title: 'RISK METRICS', metrics: [
      ['Sharpe Ratio', 'sharpe', 'num2', true],
      ['Sortino Ratio', 'sortino', 'num2', true],
      ['Calmar Ratio', 'calmar', 'num2', true],
      ['Kelly Criterion', 'kelly', 'pct1', true],
      ['Max Drawdown ₹', 'maxDD', 'inr', false], // less negative is better
      ['Max Drawdown %', 'maxDDPct', 'pct2', false], // less negative is better
      ['Recovery Factor', 'recoveryFactor', 'num2', true],
    ]},
    { title: 'STREAKS', metrics: [
      ['Max Win Streak', 'maxWinStreak', 'int', true],
      ['Max Loss Streak', 'maxLossStreak', 'int', false],
    ]},
    { title: 'ADVANCED RISK', metrics: [
      ['VaR (95%)', 'var95', 'pct2', false],
      ['95th Pctl Gain', 'p95gain', 'pct2', true],
      ['Tail Ratio', 'tailRatio', 'num2', true],
      ['Skewness', 'skewness', 'num3', true],
      ['Excess Kurtosis', 'kurtosis', 'num3', false],
      ['CVaR (95%)', 'cvarPct', 'pct2', false],
    ]},
    { title: 'LONG / SHORT', metrics: [
      ['Long Win Rate', 'longWR', 'pct1', true],
      ['Short Win Rate', 'shortWR', 'pct1', true],
      ['Long P&L', 'longPnl', 'inr', true],
      ['Short P&L', 'shortPnl', 'inr', true],
    ]},
  ];

  function fmt(val, type) {
    switch(type) {
      case 'int': return Math.round(val).toLocaleString('en-IN');
      case 'inr': return fC(val);
      case 'pct1': return fN(val,1)+'%';
      case 'pct2': return fN(val,2)+'%';
      case 'num2': return fN(val,2);
      case 'num3': return fN(val,3);
      default: return String(val);
    }
  }

  function getWinner(valA, valB, higherIsBetter) {
    // For "lower is better" metrics like losses (which are negative), we want the one closer to 0
    if (higherIsBetter) {
      if (valA > valB) return 'A';
      if (valB > valA) return 'B';
      return 'TIE';
    } else {
      // Lower is better — but for negative values (drawdown, losses), less negative is better
      // So we still compare: which is "better"?
      // For charges: lower abs is better → valA < valB means A wins
      // For max DD (negative): less negative (closer to 0) is better → valA > valB means A wins
      if (valA > valB) return 'A';
      if (valB > valA) return 'B';
      return 'TIE';
    }
  }

  let scoreA = 0, scoreB = 0, ties = 0;
  let rows = '';

  sections.forEach(sec => {
    rows += `<tr class="separator-row"><td colspan="4">${sec.title}</td></tr>`;
    sec.metrics.forEach(([label, key, type, hib]) => {
      const vA = mA[key], vB = mB[key];
      const winner = getWinner(vA, vB, hib);
      if (winner === 'A') scoreA++;
      else if (winner === 'B') scoreB++;
      else ties++;
      const wClass = winner==='A'?'winner-a':winner==='B'?'winner-b':'winner-tie';
      const wText = winner==='A'?'◀ '+mA.name:winner==='B'?mB.name+' ▶':'TIE';
      const aHL = winner==='A'?'val-highlight':'';
      const bHL = winner==='B'?'val-highlight':'';
      rows += `<tr><td>${label}</td><td class="${aHL}">${fmt(vA,type)}</td><td class="${bHL}">${fmt(vB,type)}</td><td class="winner-cell ${wClass}">${wText}</td></tr>`;
    });
  });

  const overallWinner = scoreA > scoreB ? 'A' : scoreB > scoreA ? 'B' : 'TIE';

  document.getElementById('vs-content').innerHTML = `
    <div class="vs-banner">
      <h2><span class="vs-a">${mA.name}</span><span class="vs-x">VS</span><span class="vs-b">${mB.name}</span></h2>
      <div class="vs-sub">HEAD-TO-HEAD METRICS COMPARISON</div>
    </div>

    <div class="compare-scorecard">
      <div class="score-card score-a">
        <div class="sc-label">METRICS WON</div>
        <div class="sc-value">${scoreA}</div>
        <div class="sc-name">${mA.name}</div>
      </div>
      <div class="score-card score-tie">
        <div class="sc-label">TIED</div>
        <div class="sc-value">${ties}</div>
        <div class="sc-name">DRAW</div>
      </div>
      <div class="score-card score-b">
        <div class="sc-label">METRICS WON</div>
        <div class="sc-value">${scoreB}</div>
        <div class="sc-name">${mB.name}</div>
      </div>
    </div>

    ${overallWinner !== 'TIE' ? `
    <div style="text-align:center;margin-bottom:30px;padding:20px;background:var(--bg2);border:1px solid var(--border);position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${overallWinner==='A'?'var(--stratA)':'var(--stratB)'};"></div>
      <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.2em;color:var(--text3);text-transform:uppercase;margin-bottom:8px;">OVERALL WINNER</div>
      <div style="font-family:var(--mono);font-size:28px;font-weight:700;color:${overallWinner==='A'?'var(--stratA)':'var(--stratB)'};letter-spacing:0.1em;">
        🏆 ${overallWinner==='A'?mA.name:mB.name}
      </div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:6px;letter-spacing:0.08em;">
        WON ${overallWinner==='A'?scoreA:scoreB} OUT OF ${scoreA+scoreB+ties} METRICS
      </div>
    </div>
    ` : `
    <div style="text-align:center;margin-bottom:30px;padding:20px;background:var(--bg2);border:1px solid var(--border);">
      <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--text3);">⚖ DEAD EVEN</div>
    </div>
    `}

    <div style="overflow-x:auto;border:1px solid var(--border);">
      <table class="compare-table">
        <thead>
          <tr>
            <th style="width:25%;">METRIC</th>
            <th class="strat-a-head" style="width:25%;">${mA.name}</th>
            <th class="strat-b-head" style="width:25%;">${mB.name}</th>
            <th class="winner-head" style="width:25%;">WINNER</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}
</script>
</body>
</html>
