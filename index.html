<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SAHAJ FINTECH</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#070d15;
    --bg2:#0d1a27;
    --bg3:#0f2133;
    --border:#1a3050;
    --border2:#243d5a;
    --text:#e8f4ff;
    --text2:#6a8ea8;
    --text3:#3a5570;
    --accent:#00d4ff;
    --accent-dim:rgba(0,212,255,0.08);
    --mono:'Space Mono',monospace;
    --sans:'DM Sans',sans-serif;
    --shadow:0 4px 24px rgba(0,0,0,0.5);
  }

  html,body{
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    overflow:hidden;
  }

  .bg-grid{
    position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,212,255,0.04) 1px,transparent 1px);
    background-size:40px 40px;
    animation:gridPulse 4s ease-in-out infinite;
    pointer-events:none;
  }

  .scan-lines{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
  .scan-line{
    position:absolute;height:1px;width:100%;
    background:linear-gradient(90deg,transparent,rgba(0,212,255,0.45),transparent);
    animation:lineScan 3s linear infinite;
  }
  .scan-line:nth-child(1){top:20%;animation-delay:0s}
  .scan-line:nth-child(2){top:50%;animation-delay:1s}
  .scan-line:nth-child(3){top:80%;animation-delay:2s}

  .corner{position:fixed;width:60px;height:60px;pointer-events:none;}
  .corner::before,.corner::after{content:'';position:absolute;background:var(--accent);}
  .corner::before{width:2px;height:100%;}
  .corner::after{width:100%;height:2px;}
  .corner.tl{top:24px;left:24px;}
  .corner.tr{top:24px;right:24px;transform:scaleX(-1);}
  .corner.bl{bottom:24px;left:24px;transform:scaleY(-1);}
  .corner.br{bottom:24px;right:24px;transform:scale(-1,-1);}

  .stage{
    position:relative;z-index:10;
    height:100vh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    animation:fadeIn 1.2s ease forwards;
  }

  .logo-box{
    width:72px;height:72px;
    border:2px solid var(--accent);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:32px;
    box-shadow:0 0 32px rgba(0,212,255,0.25),inset 0 0 16px rgba(0,212,255,0.05);
    animation:boxPulse 2.5s ease-in-out infinite;
  }
  .logo-box svg{width:36px;height:36px;stroke:var(--accent);fill:none;stroke-width:1.5;}

  .brand{
    font-family:var(--mono);
    font-size:clamp(28px,5vw,52px);
    font-weight:700;
    letter-spacing:0.18em;
    color:var(--text);
    text-transform:uppercase;
    animation:titleGlow 2s ease-in-out infinite alternate;
    line-height:1;
    margin-bottom:16px;
  }
  .brand span{color:var(--accent);}

  .tagline{
    font-family:var(--sans);
    font-size:clamp(12px,1.8vw,16px);
    font-weight:300;
    letter-spacing:0.22em;
    color:var(--text2);
    text-transform:uppercase;
    margin-bottom:52px;
  }

  .divider{
    width:200px;height:1px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);
    margin-bottom:52px;
    opacity:0.6;
  }

  .enter-btn{
    font-family:var(--mono);
    font-size:12px;
    font-weight:700;
    letter-spacing:0.25em;
    color:var(--bg);
    background:var(--accent);
    border:none;
    padding:16px 64px;
    cursor:pointer;
    text-transform:uppercase;
    transition:all 0.3s;
    position:relative;
    overflow:hidden;
  }
  .enter-btn::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,0.3),transparent);
    transform:translateX(-100%);transition:transform 0.4s;
  }
  .enter-btn:hover::before{transform:translateX(100%);}
  .enter-btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 40px rgba(0,212,255,0.55);
  }

  .version{
    position:fixed;bottom:28px;right:32px;
    font-family:var(--mono);font-size:10px;
    color:var(--text3);letter-spacing:0.12em;
    z-index:10;
  }

  @keyframes gridPulse{0%,100%{opacity:0.5}50%{opacity:1}}
  @keyframes lineScan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  @keyframes titleGlow{
    from{text-shadow:0 0 20px rgba(0,212,255,0.2)}
    to{text-shadow:0 0 60px rgba(0,212,255,0.6),0 0 120px rgba(0,212,255,0.2)}
  }
  @keyframes boxPulse{
    0%,100%{box-shadow:0 0 20px rgba(0,212,255,0.2),inset 0 0 10px rgba(0,212,255,0.03)}
    50%{box-shadow:0 0 48px rgba(0,212,255,0.45),inset 0 0 20px rgba(0,212,255,0.08)}
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="bg-grid"></div>

<div class="scan-lines">
  <div class="scan-line"></div>
  <div class="scan-line"></div>
  <div class="scan-line"></div>
</div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="stage">

  <div class="logo-box">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <line x1="12" y1="2" x2="12" y2="5"/>
      <rect x="10" y="5" width="4" height="7" rx="0.5"/>
      <line x1="12" y1="12" x2="12" y2="15"/>
      <line x1="6" y1="4" x2="6" y2="7"/>
      <rect x="4" y="7" width="4" height="6" rx="0.5"/>
      <line x1="6" y1="13" x2="6" y2="16"/>
      <line x1="18" y1="6" x2="18" y2="9"/>
      <rect x="16" y="9" width="4" height="5" rx="0.5"/>
      <line x1="18" y1="14" x2="18" y2="17"/>
    </svg>
  </div>

  <div class="brand">SAHAJ&nbsp;<span>FINTECH</span></div>
  <div class="tagline">Pioneers in Techno-Fundamental Analysis</div>
  <div class="divider"></div>
  <button class="enter-btn" onclick="window.location.href='model1.html'">ENTER DASHBOARD</button>

</div>

<div class="version">v1.0 &nbsp;|&nbsp; SFT</div>

</body>
</html>
